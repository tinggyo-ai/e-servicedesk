<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지원요청</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  body {
    background: linear-gradient(135deg, #1e3a5f 0%, #2e86de 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    border: 0;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    max-width: 560px;
    width: 100%;
  }
  .card-header {
    background: #1e3a5f;
    border-radius: 18px 18px 0 0 !important;
    padding: 24px 28px;
  }
  .card-body { padding: 28px; }
  .form-label { font-weight: 600; font-size: .875rem; color: #333; }
  .form-control, .form-select {
    border-radius: 10px;
    border: 1.5px solid #dee2e6;
    font-size: .9rem;
    padding: 10px 14px;
  }
  .form-control:focus, .form-select:focus {
    border-color: #2e86de;
    box-shadow: 0 0 0 3px rgba(46,134,222,.15);
  }
  .priority-group { display: flex; gap: 8px; }
  .priority-btn {
    flex: 1;
    border: 2px solid #dee2e6;
    border-radius: 10px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    font-size: .82rem;
    font-weight: 600;
    transition: .15s;
    background: #fff;
    user-select: none;
  }
  .priority-btn:hover { border-color: #aaa; }
  .priority-btn.selected-긴급 { background:#fde8e8; border-color:#e74c3c; color:#c0392b; }
  .priority-btn.selected-높음 { background:#fef5e6; border-color:#e67e22; color:#d35400; }
  .priority-btn.selected-보통 { background:#e8f4fd; border-color:#2e86de; color:#1a6ab5; }
  .priority-btn.selected-낮음 { background:#eafaf1; border-color:#27ae60; color:#1e8449; }
  .btn-submit {
    background: #1e3a5f;
    border: 0;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    padding: 14px;
    letter-spacing: .03em;
    transition: .2s;
  }
  .btn-submit:hover { background: #2e86de; transform: translateY(-1px); }

  /* 완료 화면 */
  #done-screen { display: none; text-align: center; padding: 12px 0; }
  #done-screen .check-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: #eafaf1; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 2rem; color: #27ae60;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="d-flex align-items-center gap-3">
      <div style="background:rgba(255,255,255,.15);border-radius:12px;padding:10px 13px;">
        <i class="fa-solid fa-headset text-white fs-5"></i>
      </div>
      <div>
        <h5 class="text-white mb-0 fw-bold">지원요청</h5>
        <small class="text-white-50">IT 문제가 생기면 이 양식으로 접수해주세요</small>
      </div>
    </div>
  </div>

  <div class="card-body">

    <!-- 접수 폼 -->
    <div id="form-screen">
      <div class="mb-3">
        <label class="form-label">이름 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-requester" placeholder="홍길동">
      </div>

      <div class="mb-3">
        <label class="form-label">부서</label>
        <input class="form-control" id="f-dept" placeholder="예: 영업팀, 회계팀">
      </div>

      <div class="mb-3">
        <label class="form-label">자산번호 <span class="text-muted" style="font-size:.8rem;font-weight:400">(PC, 노트북 등 자산번호가 있다면 입력)</span></label>
        <input class="form-control" id="f-asset-number" placeholder="예: PC-2024-001, SN123456">
      </div>

      <div class="mb-3">
        <label class="form-label">제목 <span class="text-danger">*</span></label>
        <input class="form-control" id="f-title" placeholder="예: 컴퓨터가 켜지지 않아요">
      </div>

      <div class="mb-3">
        <label class="form-label">상세 내용</label>
        <textarea class="form-control" id="f-description" rows="4"
          placeholder="언제부터, 어떤 증상인지 자세히 적어주세요&#10;예: 오늘 오전부터 PC 전원을 켜면 파란 화면이 뜨고 꺼집니다."></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label d-block">긴급도</label>
        <div class="priority-group">
          <div class="priority-btn selected-보통" data-val="보통" onclick="selectPriority(this)">
            <div style="font-size:1.2rem">🟢</div>보통
          </div>
          <div class="priority-btn" data-val="높음" onclick="selectPriority(this)">
            <div style="font-size:1.2rem">🟠</div>높음
          </div>
          <div class="priority-btn" data-val="긴급" onclick="selectPriority(this)">
            <div style="font-size:1.2rem">🔴</div>긴급
          </div>
          <div class="priority-btn" data-val="낮음" onclick="selectPriority(this)">
            <div style="font-size:1.2rem">🔵</div>낮음
          </div>
        </div>
      </div>

      <div id="error-msg" class="alert alert-danger d-none py-2 px-3" style="font-size:.875rem"></div>

      <button class="btn btn-submit btn-primary w-100 text-white" onclick="submit()">
        <i class="fa-solid fa-paper-plane me-2"></i>접수하기
      </button>
    </div>

    <!-- 완료 화면 -->
    <div id="done-screen">
      <div class="check-icon">
        <i class="fa-solid fa-check"></i>
      </div>
      <h5 class="fw-bold mb-1">접수 완료!</h5>
      <p class="text-muted mb-1" id="done-msg"></p>
      <p class="text-muted small mb-4">IT 담당자가 확인 후 처리해드립니다.</p>
      <div class="border rounded-3 p-3 text-start bg-light mb-4" id="done-summary" style="font-size:.875rem"></div>
      <button class="btn btn-outline-secondary btn-sm rounded-pill px-4" onclick="reset()">
        <i class="fa-solid fa-rotate-left me-1"></i>새 접수 등록
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let selectedPriority = '보통';

function selectPriority(el) {
  document.querySelectorAll('.priority-btn').forEach(b => {
    b.className = 'priority-btn';
  });
  selectedPriority = el.dataset.val;
  el.classList.add('selected-' + selectedPriority);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('d-none');
}

async function submit() {
  document.getElementById('error-msg').classList.add('d-none');

  const requester   = document.getElementById('f-requester').value.trim();
  const dept        = document.getElementById('f-dept').value.trim();
  const assetNumber = document.getElementById('f-asset-number').value.trim();
  const title       = document.getElementById('f-title').value.trim();
  const description = document.getElementById('f-description').value.trim();

  if (!requester) return showError('이름을 입력해주세요.');
  if (!title)     return showError('제목을 입력해주세요.');

  const descWithDept = dept ? `[${dept}] ${description}` : description;

  const body = {
    title,
    description: descWithDept,
    priority: selectedPriority,
    requester,
    asset_number: assetNumber || ''
  };

  try {
    const r = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await r.json();
    if (json.success) {
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('done-screen').style.display = 'block';
      document.getElementById('done-msg').textContent = `접수번호 #${json.data.id}`;
      document.getElementById('done-summary').innerHTML = `
        <div class="mb-1"><strong>이름:</strong> ${requester}${dept?' ('+dept+')':''}</div>
        ${assetNumber?`<div class="mb-1"><strong>자산번호:</strong> ${assetNumber}</div>`:''}
        <div class="mb-1"><strong>제목:</strong> ${title}</div>
        <div class="mb-1"><strong>긴급도:</strong> ${selectedPriority}</div>
        ${description?`<div><strong>내용:</strong> ${description}</div>`:''}
      `;
    } else {
      showError('오류가 발생했습니다: ' + json.message);
    }
  } catch(e) {
    showError('서버 연결에 실패했습니다. IT 담당자에게 문의해주세요.');
  }
}

function reset() {
  document.getElementById('form-screen').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('f-requester').value = '';
  document.getElementById('f-dept').value = '';
  document.getElementById('f-asset-number').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-description').value = '';
  selectedPriority = '보통';
  document.querySelectorAll('.priority-btn').forEach(b => b.className = 'priority-btn');
  document.querySelector('[data-val="보통"]').classList.add('selected-보통');
}
</script>
</body>
</html>
