# fly.toml app configuration file generated for it-manager on 2026-05-04T15:48:54+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'it-manager'
primary_region = 'nrt'

[build]

[env]
  DB_PATH = "/app/data/it_manager.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "it_manager_data"
  destination = "/app/data"
